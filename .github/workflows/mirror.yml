name: Mirror private repo to second account

on:
  push:
  create:
  delete:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clone source as bare repo
        run: git clone --bare "https://github.com/${GITHUB_REPOSITORY}.git" .

      - name: Push to mirror repo
        env:
          MIRROR_TOKEN: ${{ secrets.RYMIND_MIRROR_TOKEN }}
          MIRROR_REPO: ${{ secrets.MIRROR_REPO_URL }}
        run: |
          echo "MIRROR_REPO=$MIRROR_REPO"
          git push --mirror "https://x:${MIRROR_TOKEN}@${MIRROR_REPO#https://}"
